services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: t-gen-app
        restart: unless-stopped
        ports:
            - "6500:6500"
        environment:
            APP_NAME: "T-Gen"
            APP_ENV: production
            APP_DEBUG: "false"
            APP_URL: ${APP_URL}
            APP_KEY: ${APP_KEY}
            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: ${DB_DATABASE:-tgen}
            DB_USERNAME: ${DB_USERNAME:-tgen}
            DB_PASSWORD: ${DB_PASSWORD:-secret}
            SESSION_DRIVER: database
            CACHE_STORE: database
            QUEUE_CONNECTION: database
            LOG_CHANNEL: stderr
            LOG_LEVEL: info
        volumes:
            - app-storage:/var/www/html/storage
            - app-bootstrap-cache:/var/www/html/bootstrap/cache
        depends_on:
            db:
                condition: service_healthy
        networks:
            - tgen-network

    db:
        image: mysql:8.0
        container_name: t-gen-db
        restart: unless-stopped
        ports:
            - "3308:3306"
        environment:
            MYSQL_DATABASE: ${DB_DATABASE:-tgen}
            MYSQL_USER: ${DB_USERNAME:-tgen}
            MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
        volumes:
            - db-data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        networks:
            - tgen-network

volumes:
    app-storage:
    app-bootstrap-cache:
    db-data:

networks:
    tgen-network:
        driver: bridge
